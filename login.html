<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SMS Sender | Philippines Only</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* {
font-family: 'Inter', sans-serif;
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
background: black;
color: white;
min-height: 100vh;
display: flex;
flex-direction: column;
}
.navbar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 16px 24px;
border-bottom: 1px solid rgba(0, 255, 0, 0.3);
}
.brand {
font-size: 22px;
font-weight: 700;
}
.brand .green {
color: #00ff00;
}
.brand .white {
color: #ffffff;
}
.menu-btn {
font-size: 28px;
cursor: pointer;
color: #00ff00;
transition: 0.2s;
}
.menu-btn:hover {
opacity: 0.8;
}
.menu-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.7);
backdrop-filter: blur(4px);
z-index: 999;
display: none;
}
.menu-overlay.active {
display: block;
}
.menu {
position: fixed;
top: 12px;
right: -300px;
width: 280px;
background: #111;
border: 1px solid #00ff00;
border-radius: 20px;
padding: 20px 16px;
box-shadow: 0 20px 40px rgba(0, 255, 0, 0.2);
transition: right 0.3s ease;
z-index: 1000;
}
.menu.active {
right: 12px;
}
.menu-header {
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 1px solid #333;
padding-bottom: 12px;
margin-bottom: 8px;
}
.menu-title {
color: #00ff00;
font-weight: 700;
font-size: 18px;
}
.close-btn {
color: #fff;
font-size: 24px;
cursor: pointer;
line-height: 1;
}
.close-btn:hover {
color: #00ff00;
}
.menu-items a {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 8px;
color: #ddd;
text-decoration: none;
border-bottom: 1px solid #222;
transition: 0.2s;
}
.menu-items a:hover {
background: rgba(0, 255, 0, 0.1);
color: #00ff00;
padding-left: 16px;
}
.main-content {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 20px;
}
.login-box {
background: #18181b;
border: 2px solid rgba(0, 255, 0, 0.3);
border-radius: 1rem;
padding: 2rem;
width: 100%;
max-width: 448px;
box-shadow: 0 20px 40px rgba(0, 255, 0, 0.1);
}
.credit-line {
text-align: center;
font-family: 'Courier New', Courier, monospace;
font-size: 16px;
color: #9ca3af;
margin-top: 30px;
padding: 5px 0;
}
.credit-line span {
color: #00ff00;
font-weight: 500;
}
.ph-badge {
background: linear-gradient(135deg, rgba(0, 100, 0, 0.25) 0%, rgba(0, 255, 0, 0.1) 100%);
border: 1px solid rgba(0, 255, 0, 0.4);
border-radius: 40px;
padding: 8px 16px;
display: inline-flex;
align-items: center;
gap: 8px;
font-size: 13px;
font-weight: 500;
color: #4ade80;
margin-bottom: 20px;
backdrop-filter: blur(4px);
}
</style>
</head>
<body>
<div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>
<nav class="navbar">
<div class="brand">
<span class="green">CUSTOM</span> <span class="white">SMS SENDER</span>
</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</nav>
<div class="menu" id="sideMenu">
<div class="menu-header">
<div class="menu-title">📱 Menu</div>
<div class="close-btn" onclick="toggleMenu()">✕</div>
</div>
<div class="menu-items">
<a href="index.html">🏠 Home</a>
<a href="login.html">🔐 Login</a>
<a href="register.html">📝 Register</a>
</div>
</div>
<div class="main-content">
<div class="login-box">
<div class="flex justify-center mb-4">
<div class="ph-badge">
<span>🇵🇭</span> PHILIPPINES MOBILE USERS ONLY <span>🇵🇭</span>
</div>
</div>
<div class="text-center mb-6">
<h2 class="text-3xl font-bold">
<span class="text-green-400">Welcome</span> Back
</h2>
<p class="text-gray-400 mt-2">Login to your account</p>
</div>
<form id="loginForm" class="space-y-5">
<div>
<label class="block text-sm font-medium text-gray-300 mb-2">📧 Email or Username</label>
<input type="text" id="login_identifier" name="login_identifier" required class="w-full px-4 py-3 bg-black border border-green-500/30 rounded-lg focus:border-green-400 focus:outline-none text-white">
</div>
<div>
<label class="block text-sm font-medium text-gray-300 mb-2">🔒 Password</label>
<input type="password" id="password" name="password" required class="w-full px-4 py-3 bg-black border border-green-500/30 rounded-lg focus:border-green-400 focus:outline-none text-white">
</div>
<div id="loginMessage" class="text-center text-sm min-h-[24px]"></div>
<button type="submit" id="loginBtn" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-3 px-4 rounded-lg transition duration-200">
🔐 Login
</button>
<p class="text-center text-gray-400 mt-4">
Don't have an account? 
<a href="register.html" class="text-green-400 hover:underline">Register here</a>
</p>
</form>
</div>
<div class="credit-line">
© Developed by <span>Sarwar Sayem</span> | 🇵🇭 Philippines Only
</div>
</div>

<script>
function toggleMenu() {
document.getElementById('sideMenu').classList.toggle('active');
document.getElementById('menuOverlay').classList.toggle('active');
}
function closeMenu() {
document.getElementById('sideMenu').classList.remove('active');
document.getElementById('menuOverlay').classList.remove('active');
}

$(document).ready(function() {
    // Check if already logged in
    if (localStorage.getItem('current_user')) {
        window.location.href = 'index.html';
        return;
    }
    
    $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        
        const identifier = $('#login_identifier').val().trim();
        const password = $('#password').val();
        const message = $('#loginMessage');
        const btn = $('#loginBtn');
        
        message.html('');
        
        if (!identifier || !password) {
            message.html('<span class="text-red-400">❌ All fields are required</span>');
            return;
        }
        
        btn.prop('disabled', true);
        btn.html('Logging in...');
        message.html('<span class="text-green-400">⏳ Please wait...</span>');
        
        // Get users from localStorage
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        
        // Find user by username or email
        const user = users.find(u => 
            u.username === identifier || 
            u.email === identifier
        );
        
        // Simulate network delay
        setTimeout(() => {
            if (user && user.password === password) {
                // Store current user session
                const sessionUser = {
                    id: user.id,
                    username: user.username,
                    email: user.email,
                    phone: user.phone,
                    balance: user.balance
                };
                localStorage.setItem('current_user', JSON.stringify(sessionUser));
                
                message.html('<span class="text-green-400">✅ Login successful! Redirecting...</span>');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                message.html('<span class="text-red-400">❌ Invalid username/email or password</span>');
                btn.prop('disabled', false);
                btn.html('🔐 Login');
            }
        }, 500);
    });
});
</script>
</body>
</html>
